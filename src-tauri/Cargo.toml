[package]
name = "termhaus"
version = "0.4.0"
description = "A control room of live terminals — a GUI terminal multiplexer for driving fleets of CLI agents"
authors = ["Termhaus"]
edition = "2021"
# Two binaries now (the app + the `th` control CLI, ADR-0007); name the app as the default
# so `cargo run` / `tauri dev` stay unambiguous.
default-run = "termhaus"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[lib]
# The `_lib` suffix may seem redundant but it is necessary
# to make the lib name unique and wouldn't conflict with the bin name.
# This seems to be only an issue on Windows, see https://github.com/rust-lang/cargo/issues/8519
name = "termhaus_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

# The inter-pane control CLI (ADR-0007), built beside the app binary so it lands on the
# child PATH we inject into each pane. std + serde_json only — no extra deps.
[[bin]]
name = "th"
path = "src/bin/th.rs"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["tray-icon"] }
tauri-plugin-opener = "2"
tauri-plugin-dialog = "2"
tauri-plugin-global-shortcut = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
portable-pty = "0.8"
base64 = "0.22"
tauri-plugin-clipboard-manager = "2.3.2"
tauri-plugin-notification = "2"

