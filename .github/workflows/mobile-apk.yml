name: Build Android APK

# Builds an installable APK of the local-first mobile app (mobile/) and uploads it as a downloadable
# artifact — no local Android SDK, no Expo account. Manual-trigger only (Android builds are
# slow/heavy), so it never gates PRs or runs on unrelated pushes.
#
# Builds the RELEASE variant on purpose: a *debug* APK does not embed the JS bundle — it expects a
# Metro dev server at runtime, so installed standalone it fails with "Unable to load script". The
# release variant embeds index.android.bundle (self-contained, no Metro) and — via Expo's prebuild
# defaults — is signed with the debug keystore, so it still installs for personal sideloading without
# a custom signing key. It is NOT a Play-Store upload.
#
# To use: Actions tab → "Build Android APK" → Run workflow → pick the branch → download the artifact.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch/tag to build (defaults to the selected ref)"
        required: false

permissions:
  contents: read

concurrency:
  group: mobile-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      # React Native 0.76 / AGP needs JDK 17.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # ubuntu-latest ships an Android SDK, but pin components + accept licenses so the Gradle build
      # never stalls on a missing platform/build-tools.
      - uses: android-actions/setup-android@v3

      - name: Install JS deps
        working-directory: mobile
        run: npm ci

      # Generate the native android/ project from app.json (config plugins run here).
      - name: Expo prebuild (android)
        working-directory: mobile
        run: npx expo prebuild --platform android --no-install

      - name: Gradle assembleRelease
        working-directory: mobile/android
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: loom-android-release-apk
          path: mobile/android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
