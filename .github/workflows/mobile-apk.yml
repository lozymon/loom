name: Build Android APK

# Builds an installable debug APK of the local-first mobile app (mobile/) and uploads it as a
# downloadable artifact — no local Android SDK, no Expo account. Manual-trigger only (Android builds
# are slow/heavy), so it never gates PRs or runs on unrelated pushes. Debug-signed: it installs on
# your own device for sideloading; it is NOT a Play-Store release.
#
# To use: Actions tab → "Build Android APK" → Run workflow → pick the branch → download the artifact.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch/tag to build (defaults to the selected ref)"
        required: false

permissions:
  contents: read

concurrency:
  group: mobile-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      # React Native 0.76 / AGP needs JDK 17.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # ubuntu-latest ships an Android SDK, but pin components + accept licenses so the Gradle build
      # never stalls on a missing platform/build-tools.
      - uses: android-actions/setup-android@v3

      - name: Install JS deps
        working-directory: mobile
        run: npm ci

      # Generate the native android/ project from app.json (config plugins run here).
      - name: Expo prebuild (android)
        working-directory: mobile
        run: npx expo prebuild --platform android --no-install

      - name: Gradle assembleDebug
        working-directory: mobile/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: loom-android-debug-apk
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
