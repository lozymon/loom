name: CI

# Lint, typecheck, test, and build Loom. Linux is the primary target (the runtime is
# WebKitGTK); Windows support (PLAN M7) is brought up behind `#[cfg(windows)]` and guarded here
# so it can't silently rot between the Windows-VM verification passes (M7.4).
#
# Two tiers, split to keep PR feedback fast and cheap:
#
#   Every push/PR (fast feedback — these gate merges):
#   • frontend      — typecheck + unit tests (node only; no apt/Rust, so it's quick)
#   • rust-lint     — rustfmt + clippy + unit tests (the `loom` crate in src-tauri)
#   • voce          — rustfmt + clippy + unit tests for the loom-voce crate (separate crate, needs
#                     cmake for its whisper.cpp build; kept out of rust-lint so that stays webkit-only)
#   • voce-macos    — clippy on macos-latest; the ONLY job that compiles loom-voce's cpal audio
#                     backend (the ubuntu voce job compiles the Linux parecord/arecord arm instead)
#   • windows-check — cross-compile `cargo check` for the Windows target from Linux (the keystone:
#                     catches `#[cfg(windows)]` code that doesn't compile, no Windows runner needed)
#   • macos-lint    — fmt + clippy + unit tests on a real macos-latest runner (the ONLY macOS
#                     verifier — no cheap Linux→macOS cross-check exists, so this gates the mac arm)
#
#   Release tags (`v*`) and manual `workflow_dispatch` only (heavyweight — produce installers):
#   • build         — full release build + .deb and .AppImage bundles (uploaded as artifacts)
#   • windows-build — full NSIS bundle on a real windows-latest runner (the priciest runner)
#   • macos-build   — full .dmg bundle on a macos-latest runner (unsigned until notarization)
#
#   Release tags (`v*`) only:
#   • release       — create the GitHub Release and attach the .deb + .AppImage + Windows installer
#                     + macOS dmg as permanent, public assets (workflow artifacts expire off Releases)
#
# The full bundles are gated because they're expensive and don't add merge-gating signal
# the lint/check tier doesn't already give: rust-lint compiles the whole tree (clippy
# --all-targets) and windows-check compiles the Windows target, so a regression that would
# break a bundle build almost always trips one of those first. Cut a release tag (or fire the
# workflow manually) when you actually want the installable .deb / .exe artifacts.
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# Cancel superseded runs on the same ref (e.g. force-pushes to a PR branch).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (typecheck + tests)
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test

  rust-lint:
    name: Rust lint + test (fmt + clippy + unit)
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      # clippy compiles the Tauri app, which links WebKitGTK — so it needs the dev libs.
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential curl wget file \
            libxdo-dev libssl-dev \
            libayatana-appindicator3-dev librsvg2-dev

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: rust-lint

      - name: Rustfmt
        working-directory: src-tauri
        run: cargo fmt --all --check

      - name: Clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets --all-features -- -D warnings

      # Pure-logic unit tests (transport line framing, shell resolution). The lib links
      # WebKitGTK, so this reuses the deps + compilation the clippy step already set up.
      - name: Rust unit tests
        working-directory: src-tauri
        run: cargo test --lib

  voce:
    name: loom-voce (fmt + clippy + test)
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      # loom-voce is its own crate (not in the src-tauri workspace); its whisper.cpp binding needs
      # cmake to compile whisper.cpp and libclang for bindgen. No WebKit — it doesn't link the GUI.
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libclang-dev

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: loom-voce
          shared-key: voce

      - name: Rustfmt
        working-directory: loom-voce
        run: cargo fmt --all --check

      - name: Clippy
        working-directory: loom-voce
        run: cargo clippy --all-targets -- -D warnings

      # Pure-logic unit tests (VAD gate + utterance segmentation) — no audio device or model needed.
      - name: Unit tests
        working-directory: loom-voce
        run: cargo test

  voce-macos:
    name: loom-voce macOS (clippy — compiles the cpal audio backend)
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: loom-voce
          shared-key: voce-macos

      # The ONLY job that compiles audio.rs's cpal backend (`cfg(not(target_os = "linux"))`) — the
      # ubuntu `voce` job compiles the parecord/arecord Linux arm instead, so without this the cpal
      # path could rot undetected. macOS runners ship cmake (whisper.cpp build) + clang/libclang
      # (bindgen), so no extra install step is needed.
      - name: Clippy (compiles the cpal backend)
        working-directory: loom-voce
        run: cargo clippy --all-targets -- -D warnings

  macos-lint:
    name: macOS lint + test (fmt + clippy + unit)
    runs-on: macos-latest
    timeout-minutes: 30
    # The ONLY macOS verifier: unlike the Windows target (mingw cross-checks from Linux), there is
    # no cheap Linux→macOS `cargo check` (needs the Apple SDK), so a real runner gates the macOS
    # arm — the `#[cfg(unix)]` floor helper, `sysinfo` on macOS, and the shared cross-platform code.
    # macOS uses the system WKWebView (no apt / WebKitGTK dev libs needed).
    steps:
      - uses: actions/checkout@v7

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: macos-lint

      # generate_context! embeds the frontend dist, so it must exist before clippy compiles the lib.
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend (dist for generate_context!)
        run: npm run build

      - name: Rustfmt
        working-directory: src-tauri
        run: cargo fmt --all --check

      - name: Clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Rust unit tests
        working-directory: src-tauri
        run: cargo test --lib

  build:
    name: Build (.deb + AppImage bundles)
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    # Heavyweight: only on release tags or manual dispatch (see header).
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v7

      # libwebkit2gtk for the Tauri app; cmake + libclang for the loom-voce helper's whisper.cpp
      # build (whisper-rs-sys: cmake to compile whisper.cpp, libclang for bindgen).
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential curl wget file \
            libxdo-dev libssl-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            cmake libclang-dev \
            libfuse2

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri
            loom-voce
          shared-key: build

      - name: Install npm dependencies
        run: npm ci

      # Build the voice helper first — the .deb bundles it beside `loom` at /usr/bin/loom-voce
      # (bundle.linux.deb.files points at loom-voce/target/release/loom-voce), so it must exist
      # before `tauri build`. This is `build:voce` (kept a separate crate, so it's an extra step).
      - name: Build loom-voce helper
        run: npm run build:voce

      # Full release build + .deb and AppImage bundles (also runs the Vite build via
      # beforeBuildCommand). The AppImage bundler downloads linuxdeploy/appimagetool at build
      # time — that cost is why bundles are gated to the release/dispatch tier, not on every PR.
      - name: Build (.deb + AppImage bundles)
        run: npm run tauri build -- --bundles deb,appimage

      # Fail loudly if the helper didn't land in the package (e.g. a deb.files path regression).
      - name: Verify loom-voce is bundled
        run: |
          deb=$(ls src-tauri/target/release/bundle/deb/*.deb)
          # dpkg -c prints the path as "usr/bin/loom-voce" (no leading ./), so match on the suffix.
          dpkg -c "$deb" | grep -qE 'usr/bin/loom-voce$' \
            && echo "loom-voce bundled at /usr/bin/loom-voce ✓" \
            || { echo "loom-voce MISSING from $deb"; dpkg -c "$deb" | grep -i loom; exit 1; }

      # Same guard for the AppImage (bundle.linux.appimage.files). --appimage-extract unpacks the
      # squashfs without FUSE/mounting, so it works headless on the runner; check the helper is inside.
      - name: Verify loom-voce is in the AppImage
        run: |
          app=$(ls src-tauri/target/release/bundle/appimage/*.AppImage)
          chmod +x "$app"
          "$app" --appimage-extract >/dev/null
          test -f squashfs-root/usr/bin/loom-voce \
            && echo "loom-voce bundled in the AppImage ✓" \
            || { echo "loom-voce MISSING from $app"; find squashfs-root -iname '*loom*'; exit 1; }
          rm -rf squashfs-root

      # Make the Linux builds downloadable from the Actions run, mirroring the
      # Windows job — install on any box without a local toolchain.
      - name: Upload Linux .deb
        uses: actions/upload-artifact@v7
        with:
          name: loom-linux-deb
          path: src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: error

      - name: Upload Linux AppImage
        uses: actions/upload-artifact@v7
        with:
          name: loom-linux-appimage
          path: src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error

  windows-check:
    name: Windows cross-check (cargo check from Linux)
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      # The Windows target links nothing here (`cargo check` stops before linking), so no
      # WebView2/WebKit libs are needed — only mingw's `windres`, which tauri's build script
      # runs to embed the Windows resource (icon/version) for the target.
      - name: Install mingw toolchain (windres + its gcc preprocessor)
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Set up Rust (Windows target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: windows-check

      # generate_context! (in the lib) embeds the frontend dist, so it must exist before the check.
      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend (dist for generate_context!)
        run: npm run build

      - name: Cargo check (Windows target)
        working-directory: src-tauri
        run: cargo check --target x86_64-pc-windows-gnu --all-targets

  windows-build:
    name: Windows build (NSIS bundle)
    runs-on: windows-latest
    timeout-minutes: 60
    # Heavyweight (priciest runner): only on release tags or manual dispatch (see header).
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri
            loom-voce
          shared-key: windows-build

      - name: Install npm dependencies
        run: npm ci

      # Build the voice helper (cpal/WASAPI backend on Windows) and stage it as a tauri sidecar so it
      # ships beside loom.exe in the installer. whisper-rs-sys needs cmake (preinstalled on the runner)
      # + libclang for bindgen — LLVM is preinstalled at C:\Program Files\LLVM, so point bindgen at it.
      - name: Build loom-voce helper
        env:
          LIBCLANG_PATH: C:\Program Files\LLVM\bin
        run: npm run build:voce

      - name: Stage loom-voce as a tauri sidecar
        shell: pwsh
        run: |
          $triple = ((rustc -vV | Select-String '^host:').ToString() -split '\s+')[1]
          New-Item -ItemType Directory -Force -Path src-tauri/binaries | Out-Null
          Copy-Item loom-voce/target/release/loom-voce.exe "src-tauri/binaries/loom-voce-$triple.exe"
          # Inject externalBin into the Windows overlay for THIS build only (ephemeral, never committed).
          # It's kept OUT of the checked-in tauri.windows.conf.json on purpose: tauri validates
          # externalBin on every build (including windows-check's cross-compile), so a committed entry
          # would break those jobs, which don't stage the binary.
          $f = 'src-tauri/tauri.windows.conf.json'
          $j = Get-Content $f -Raw | ConvertFrom-Json
          $j.bundle | Add-Member -NotePropertyName externalBin -NotePropertyValue @('binaries/loom-voce') -Force
          $j | ConvertTo-Json -Depth 20 | Set-Content $f
          Write-Host "staged sidecar src-tauri/binaries/loom-voce-$triple.exe + injected externalBin"

      # Full release build + NSIS installer (picks up tauri.windows.conf.json automatically;
      # bundles the WebView2 bootstrapper + the loom-voce sidecar staged above). No apt step —
      # Windows runners ship the toolchain. Cross-linking from Linux is blocked by the mingw BFD
      # linker ("export ordinal too large" on the wry/windows crates), so MSVC on this runner is the
      # supported path.
      - name: Build (NSIS bundle)
        run: npm run tauri build -- --bundles nsis

      # Only the NSIS installer — NOT the raw `target/release/loom.exe`. The bare exe is not a
      # working distributable: it doesn't bootstrap the WebView2 runtime (blank window on a machine
      # without it) and performs no install, so shipping it as a release asset just misleads testers
      # into running the wrong file. The installer bundles the WebView2 bootstrapper and installs
      # properly; it's the sole Windows download.
      - name: Upload Windows installer
        uses: actions/upload-artifact@v7
        with:
          name: loom-windows-nsis
          path: src-tauri/target/release/bundle/nsis/*-setup.exe
          if-no-files-found: error

  macos-build:
    name: macOS build (dmg bundle)
    runs-on: macos-latest
    timeout-minutes: 60
    # Heavyweight: only on release tags or manual dispatch (see header).
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri
            loom-voce
          shared-key: macos-build

      - name: Install npm dependencies
        run: npm ci

      # Build the voice helper (cpal backend on macOS; whisper.cpp via cmake — macos runners ship
      # cmake + clang/libclang), then stage it as a tauri sidecar so it ships INSIDE the .app beside
      # `loom`. `externalBin` (tauri.macos.conf.json) looks for `src-tauri/binaries/loom-voce-<triple>`,
      # so name the built binary with the runner's host triple. Voice dictation (Cmd+Shift+M) then
      # resolves the helper as a sibling of `loom` at runtime (voce.rs).
      - name: Build loom-voce helper
        run: npm run build:voce

      - name: Stage loom-voce as a tauri sidecar
        run: |
          triple=$(rustc -vV | sed -n 's/host: //p')
          mkdir -p src-tauri/binaries
          cp loom-voce/target/release/loom-voce "src-tauri/binaries/loom-voce-${triple}"
          # Inject externalBin into the macOS overlay for THIS build only (ephemeral, never committed).
          # It's kept OUT of the checked-in tauri.macos.conf.json on purpose: tauri's build script
          # validates externalBin on every cargo build, so a committed entry would break macos-lint /
          # dev builds (which don't stage the binary). We add it here, only after staging.
          node -e "const fs=require('fs'),f='src-tauri/tauri.macos.conf.json';const j=JSON.parse(fs.readFileSync(f));j.bundle.externalBin=['binaries/loom-voce'];fs.writeFileSync(f,JSON.stringify(j,null,2)+'\n')"
          echo "staged sidecar: src-tauri/binaries/loom-voce-${triple} + injected externalBin"

      # Full release build + .dmg (picks up tauri.macos.conf.json automatically). macOS uses the
      # system WKWebView — no apt/system deps. The dmg is UNSIGNED for now — Gatekeeper warns until
      # notarization (Phase 5). Artifact is downloadable from the Actions run (arm64, matching the
      # macos-latest runner). (Windows loom-voce bundling is a follow-up — nsis job unchanged.)
      - name: Build (dmg bundle)
        run: npm run tauri build -- --bundles dmg

      - name: Upload macOS dmg
        uses: actions/upload-artifact@v7
        with:
          name: loom-macos-dmg
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    # Only on a real version tag (v*), and only after all three platform bundles built. The job
    # pulls the .deb + AppImage, the Windows installer, and the macOS dmg that build/windows-build/
    # macos-build uploaded as workflow artifacts and attaches them to the Release as permanent,
    # public assets (workflow artifacts otherwise expire and aren't visible on the Releases page).
    needs: [build, windows-build, macos-build]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write # create the release + upload assets (overrides the read-only default)
    steps:
      - name: Download Linux .deb
        uses: actions/download-artifact@v8
        with:
          name: loom-linux-deb
          path: dist

      - name: Download Linux AppImage
        uses: actions/download-artifact@v8
        with:
          name: loom-linux-appimage
          path: dist

      - name: Download Windows installer
        uses: actions/download-artifact@v8
        with:
          name: loom-windows-nsis
          path: dist

      - name: Download macOS dmg
        uses: actions/download-artifact@v8
        with:
          name: loom-macos-dmg
          path: dist

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/**
          generate_release_notes: true
          fail_on_unmatched_files: true
          # Tags with a pre-release suffix (e.g. v0.5.1-rc.1) are marked pre-release.
          prerelease: ${{ contains(github.ref_name, '-') }}
