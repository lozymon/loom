name: CI

# Lint, typecheck, test, and build Termhaus. Linux is the primary target (the runtime is
# WebKitGTK); Windows support (PLAN M7) is brought up behind `#[cfg(windows)]` and guarded here
# so it can't silently rot between the Windows-VM verification passes (M7.4).
#
# Two tiers, split to keep PR feedback fast and cheap:
#
#   Every push/PR (fast feedback — these gate merges):
#   • frontend      — typecheck + unit tests (node only; no apt/Rust, so it's quick)
#   • rust-lint     — rustfmt + clippy + unit tests
#   • windows-check — cross-compile `cargo check` for the Windows target from Linux (the keystone:
#                     catches `#[cfg(windows)]` code that doesn't compile, no Windows runner needed)
#
#   Release tags (`v*`) and manual `workflow_dispatch` only (heavyweight — produce installers):
#   • build         — full release build + .deb bundle (uploaded as a downloadable artifact)
#   • windows-build — full NSIS bundle on a real windows-latest runner (the priciest runner)
#
#   Release tags (`v*`) only:
#   • release       — create the GitHub Release and attach the .deb + Windows installer as
#                     permanent, public assets (workflow artifacts expire and don't show on Releases)
#
# The full bundles are gated because they're expensive and don't add merge-gating signal
# the lint/check tier doesn't already give: rust-lint compiles the whole tree (clippy
# --all-targets) and windows-check compiles the Windows target, so a regression that would
# break a bundle build almost always trips one of those first. Cut a release tag (or fire the
# workflow manually) when you actually want the installable .deb / .exe artifacts.
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# Cancel superseded runs on the same ref (e.g. force-pushes to a PR branch).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (typecheck + tests)
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test

  rust-lint:
    name: Rust lint + test (fmt + clippy + unit)
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      # clippy compiles the Tauri app, which links WebKitGTK — so it needs the dev libs.
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential curl wget file \
            libxdo-dev libssl-dev \
            libayatana-appindicator3-dev librsvg2-dev

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: rust-lint

      - name: Rustfmt
        working-directory: src-tauri
        run: cargo fmt --all --check

      - name: Clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets --all-features -- -D warnings

      # Pure-logic unit tests (transport line framing, shell resolution). The lib links
      # WebKitGTK, so this reuses the deps + compilation the clippy step already set up.
      - name: Rust unit tests
        working-directory: src-tauri
        run: cargo test --lib

  build:
    name: Build (.deb bundle)
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    # Heavyweight: only on release tags or manual dispatch (see header).
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v7

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential curl wget file \
            libxdo-dev libssl-dev \
            libayatana-appindicator3-dev librsvg2-dev

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: build

      - name: Install npm dependencies
        run: npm ci

      # Full release build + .deb bundle (also runs the Vite build via
      # beforeBuildCommand). Skips AppImage to avoid its build-time downloads.
      - name: Build (.deb bundle)
        run: npm run tauri build -- --bundles deb

      # Make the Linux build downloadable from the Actions run, mirroring the
      # Windows job — install on any Debian/Ubuntu box without a local toolchain.
      - name: Upload Linux .deb
        uses: actions/upload-artifact@v7
        with:
          name: termhaus-linux-deb
          path: src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: error

  windows-check:
    name: Windows cross-check (cargo check from Linux)
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      # The Windows target links nothing here (`cargo check` stops before linking), so no
      # WebView2/WebKit libs are needed — only mingw's `windres`, which tauri's build script
      # runs to embed the Windows resource (icon/version) for the target.
      - name: Install mingw toolchain (windres + its gcc preprocessor)
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Set up Rust (Windows target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: windows-check

      # generate_context! (in the lib) embeds the frontend dist, so it must exist before the check.
      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend (dist for generate_context!)
        run: npm run build

      - name: Cargo check (Windows target)
        working-directory: src-tauri
        run: cargo check --target x86_64-pc-windows-gnu --all-targets

  windows-build:
    name: Windows build (NSIS bundle)
    runs-on: windows-latest
    timeout-minutes: 60
    # Heavyweight (priciest runner): only on release tags or manual dispatch (see header).
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: windows-build

      - name: Install npm dependencies
        run: npm ci

      # Full release build + NSIS installer (picks up tauri.windows.conf.json automatically;
      # bundles the WebView2 bootstrapper). No apt step — Windows runners ship the toolchain.
      # This is also how we get a runnable Windows build: cross-linking from Linux is blocked
      # by the mingw BFD linker ("export ordinal too large" on the wry/windows crates), so the
      # MSVC toolchain on this runner is the supported path. The artifact below is downloadable
      # from the Actions run — install it on any Windows box without a local build toolchain.
      - name: Build (NSIS bundle)
        run: npm run tauri build -- --bundles nsis

      - name: Upload Windows installer
        uses: actions/upload-artifact@v7
        with:
          name: termhaus-windows-nsis
          path: |
            src-tauri/target/release/bundle/nsis/*-setup.exe
            src-tauri/target/release/termhaus.exe
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    # Only on a real version tag (v*), and only after both bundles built. The job
    # pulls the .deb and Windows installer that build/windows-build uploaded as
    # workflow artifacts and attaches them to the Release as permanent, public assets
    # (workflow artifacts otherwise expire and aren't visible on the Releases page).
    needs: [build, windows-build]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write # create the release + upload assets (overrides the read-only default)
    steps:
      - name: Download Linux .deb
        uses: actions/download-artifact@v8
        with:
          name: termhaus-linux-deb
          path: dist

      - name: Download Windows installer
        uses: actions/download-artifact@v8
        with:
          name: termhaus-windows-nsis
          path: dist

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/**
          generate_release_notes: true
          fail_on_unmatched_files: true
          # Tags with a pre-release suffix (e.g. v0.5.1-rc.1) are marked pre-release.
          prerelease: ${{ contains(github.ref_name, '-') }}
