# Keep CI actions and dependencies patched so the pinned versions in ci.yml,
# package.json, and Cargo.toml don't silently rot. Weekly, grouped to keep PR
# noise low — patch/minor bumps land in one PR per ecosystem.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    groups:
      npm-minor-patch:
        update-types: [minor, patch]
    ignore:
      # xterm 6.0 is stable, but its addons (canvas/webgl/fit/...) only ship
      # beta pre-releases for v6 — and the canvas renderer we depend on
      # (ADR-0003/0006) has no v6-compatible release at all. Adopting v6 now
      # would pin the whole rendering stack to moving betas. Hold at 5.x until
      # the addons go stable, then drop this ignore. (See closed PR #9.)
      - dependency-name: "@xterm/xterm"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: cargo
    directory: "/src-tauri"
    schedule:
      interval: weekly
    groups:
      cargo-minor-patch:
        update-types: [minor, patch]
